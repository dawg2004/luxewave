          </footer>
        </div>
      );
    }

    // ============================================================================
    // --- Dashboard (Web App) Component ---
    // ============================================================================
    function Dashboard({ navigateTo, currentView }) {
      const [isActive, setIsActive] = useState(false);

      return (
        <div className="w-full flex flex-col min-h-screen">
          <Navigation navigateTo={navigateTo} currentView={currentView} />

          <main className="flex-grow max-w-6xl mx-auto px-6 py-12 md:py-20 w-full relative z-10">
            <header className="mb-10 border-b border-white/10 pb-8">
              <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                <div className="text-center md:text-left">
                  <h1 className="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500 tracking-tighter drop-shadow-md">
                    WEB APP DASHBOARD
                  </h1>
                  <p className="text-gray-400 font-bold tracking-widest mt-2 text-sm">システムの稼働状況</p>
                </div>

                <div className="flex flex-col sm:flex-row items-center gap-4">
                  <div className="bg-white/5 border border-white/10 backdrop-blur-md px-4 py-2 rounded-full flex items-center gap-3 text-sm font-bold">
                    <span className="text-gray-400">Status:</span>
                    {isActive ? (
                      <span className="text-cyan-400 flex items-center gap-2 drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]">
                        <Shield size={16} /> PROTECTED
                      </span>
                    ) : (
                      <span className="text-gray-500 flex items-center gap-2">
                        <AlertTriangle size={16} /> STANDBY
                      </span>
                    )}
                  </div>

                  <div className="flex items-center gap-3">
                    <span className="inline-block bg-gradient-to-r from-cyan-500 to-blue-600 text-white text-xs md:text-sm font-bold px-3 py-1.5 rounded-lg shadow-[0_0_15px_rgba(34,211,238,0.4)] border border-white/10 tracking-widest">
                      Level.1
                    </span>
                    <span className="text-cyan-400 font-black text-base md:text-lg tracking-widest drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]">
                      Shield Lite
                    </span>
                  </div>
                </div>
              </div>
            </header>

            <div className="grid lg:grid-cols-3 gap-8 md:gap-12">
              <section className="lg:col-span-2 space-y-8">
                <div className={`relative overflow-hidden rounded-3xl border ${isActive ? 'border-cyan-500/50 shadow-[0_0_30px_rgba(34,211,238,0.15)] bg-cyan-900/10' : 'border-white/10 bg-white/5'} backdrop-blur-xl p-8 md:p-12 transition-all duration-500 flex flex-col items-center justify-center min-h-[400px] md:min-h-[500px]`}>
                  <div className="absolute top-6 left-6 text-xs md:text-sm font-bold text-gray-500 tracking-widest uppercase z-20">SYSTEM CONTROL</div>
                  
                  <div className={`absolute inset-0 transition-opacity duration-1000 ${isActive ? 'opacity-100' : 'opacity-0'}`}>
                    <div className="absolute inset-0 bg-gradient-to-tr from-cyan-900/40 to-blue-900/20 mix-blend-screen"></div>
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] rounded-full border border-white/5 animate-[ping_3s_cubic-bezier(0,0,0.2,1)_infinite]"></div>
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[450px] h-[450px] rounded-full border border-white/5 animate-[ping_4s_cubic-bezier(0,0,0.2,1)_infinite]"></div>
                  </div>

                  <button 
                    onClick={() => setIsActive(!isActive)}
                    className={`relative z-10 group w-48 h-48 md:w-56 md:h-56 rounded-full flex items-center justify-center transition-all duration-500 ${
                      isActive 
                        ? 'bg-[#050515] shadow-[inset_0_0_30px_rgba(34,211,238,0.2),0_0_50px_rgba(34,211,238,0.4)] border-4 border-cyan-500' 
                        : 'bg-black/50 shadow-[inset_0_0_20px_rgba(0,0,0,0.5),0_10px_20px_rgba(0,0,0,0.5)] border-4 border-[#2a2a4a] hover:border-gray-500'
                    }`}
                  >
                    <div className={`absolute inset-2 rounded-full border-2 border-dashed ${isActive ? 'border-white/20 animate-[spin_10s_linear_infinite]' : 'border-white/5'}`}></div>
                    
                    <Power 
                      size={72} 
                      strokeWidth={1.5}
                      className={`transition-all duration-500 ${
                        isActive 
                          ? 'text-cyan-400 drop-shadow-[0_0_15px_rgba(34,211,238,1)] scale-110' 
                          : 'text-gray-600 group-hover:text-gray-400'
                      }`} 
                    />
                  </button>
                  
                  <h2 className={`mt-8 text-3xl md:text-4xl font-black tracking-widest transition-colors duration-500 relative z-10 ${isActive ? 'text-cyan-400 drop-shadow-[0_0_15px_rgba(34,211,238,0.8)]' : 'text-gray-600'}`}>
                    {isActive ? 'ON' : 'OFF'}
                  </h2>
                </div>
              </section>

              <aside className="space-y-6">
                <div className="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-[0_8px_32px_rgba(0,0,0,0.5)]">
                  <h3 className="text-white font-bold mb-6 flex items-center gap-2">
                    <Activity className="text-cyan-400" size={20} /> System Status
                  </h3>
                  <div className="space-y-6">
                    <StatMeter label="Protection Level" value={isActive ? "98%" : "0%"} color={isActive ? "bg-cyan-400" : "bg-gray-600"} percent={isActive ? 98 : 0} />
                    <StatMeter label="Wave Output" value={isActive ? "Active" : "Idle"} color={isActive ? "bg-fuchsia-400" : "bg-gray-600"} percent={isActive ? 75 : 0} />
                    <StatMeter label="Device Temp" value="32°C" color="bg-blue-400" percent={40} />
                  </div>
                </div>

                <div className="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-[0_8px_32px_rgba(0,0,0,0.5)]">
                   <h3 className="text-white font-bold mb-4">Active Profile</h3>
                   <div className="bg-black/50 rounded-xl p-4 border border-white/5 relative">
                     <p className="text-xs text-gray-400 font-bold mb-1">CURRENT STATUS</p>
                     <p className={`text-xl font-black capitalize ${
                       isActive ? 'text-cyan-400' : 'text-gray-500'
                     }`}>
                       {isActive ? 'Shield Active' : 'Standby'}
                     </p>
                     <p className="text-sm text-gray-300 mt-2 font-medium leading-relaxed">
                       {isActive ? '電磁波ダメージを軽減する基本防護プロファイルを出力しています。' : 'システムは待機状態です。中央の電源ボタンを押して保護を開始してください。'}
                     </p>
                     <div className="mt-4 pt-4 border-t border-white/10">
                        <div className="text-[10px] text-gray-500 flex items-start gap-1">
                          <AlertTriangle size={12} className="shrink-0 mt-0.5 text-amber-500/70" />
                          <span>本表示の防護レベルや効果は、『未確認情報』に基づく表現です。</span>
                        </div>
                     </div>
                   </div>
                </div>
              </aside>
            </div>
          </main>
          
          <footer className="w-full bg-[#02020a]/90 backdrop-blur-xl text-white pt-16 pb-12 px-6 border-t border-white/10 mt-auto relative z-10">
            <div className="text-center font-bold text-gray-600 text-xs md:text-sm">
              &copy; {new Date().getFullYear()} Divers Dream City Co., Ltd.
            </div>
          </footer>
        </div>
      );
    }

    // ============================================================================
    // --- Helper Components ---
    // ============================================================================

    function EffectItem({ title, desc, num }) {
      return (
        <div className="bg-black/40 border border-white/10 p-6 md:p-8 rounded-2xl backdrop-blur-md hover:bg-white/5 transition-all shadow-[0_4px_20px_rgba(0,0,0,0.3)] h-full flex flex-col">
          <div className="flex items-center gap-4 mb-4 md:mb-6">
            <span className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white/20 to-transparent leading-none">{num}</span>
            <h3 className="text-lg md:text-xl font-bold text-white leading-tight">{title}</h3>
          </div>
          <p className="text-sm md:text-base text-gray-400 font-medium leading-relaxed">{desc}</p>
        </div>
      );
    }

    function ConcernBox({ title, children }) {
      return (
        <div className="bg-black/40 border border-white/10 p-6 md:p-8 rounded-2xl backdrop-blur-md relative shadow-[0_8px_32px_rgba(0,0,0,0.5)]">
          <h3 className="text-xl md:text-2xl font-black text-white mb-4 md:mb-6 border-b border-white/10 pb-4 text-cyan-400">{title}</h3>
          <div className="text-sm md:text-base text-gray-300 leading-loose font-medium text-justify">
            {children}
          </div>
        </div>
      );
    }

    function DeviceMeter({ name, value, color }) {
      return (
        <div>
          <div className="flex justify-between items-end mb-1">
            <span className="text-sm font-bold text-gray-300">{name}</span>
          </div>
          <div className="h-2.5 w-full bg-white/5 rounded-full overflow-hidden border border-white/10">
            <div className={`h-full ${color} shadow-[0_0_10px_currentColor]`} style={{ width: `${value}%` }}></div>
          </div>
        </div>
      );
    }

    function StatMeter({ label, value, color, percent }) {
      return (
        <div>
          <div className="flex justify-between items-end mb-2">
            <span className="text-xs font-bold text-gray-400">{label}</span>
            <span className="text-sm font-black text-white">{value}</span>
          </div>
          <div className="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
            <div 
              className={`h-full ${color} transition-all duration-1000 ease-out`} 
              style={{ width: `${percent}%` }}
            ></div>
          </div>
        </div>
      );
    }

    function PricingCard({ title, level, price, features, recommended = false, special = false }) {
      const [isSelected, setIsSelected] = useState(false);

      const borderClass = isSelected
        ? 'border-cyan-400 bg-cyan-900/30 shadow-[0_0_30px_rgba(34,211,238,0.8)] scale-[1.02] z-30'
        : special 
          ? 'border-fuchsia-500 bg-gradient-to-b from-fuchsia-900/40 to-[#050515]/80 shadow-[0_0_30px_rgba(232,121,249,0.3)] md:-translate-y-2 z-20 hover:border-fuchsia-400 hover:shadow-[0_0_30px_rgba(232,121,249,0.6)]'
          : recommended 
            ? 'border-cyan-400 bg-gradient-to-b from-cyan-900/40 to-[#050515]/80 shadow-[0_0_30px_rgba(34,211,238,0.2)] md:-translate-y-4 z-10 hover:shadow-[0_0_30px_rgba(34,211,238,0.6)]' 
            : 'border-white/10 bg-white/5 backdrop-blur-md hover:bg-white/10 hover:border-cyan-500/50 hover:shadow-[0_0_20px_rgba(34,211,238,0.3)]';

      const titleColor = special ? 'from-fuchsia-400 to-purple-500' : 'from-cyan-400 to-blue-500';

      return (
        <div 
          className={`relative p-6 lg:p-8 rounded-3xl border ${borderClass} transition-all duration-300 flex flex-col h-full cursor-pointer`}
          onClick={() => setIsSelected(!isSelected)}
        >
          {recommended && !special && (
             <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-gradient-to-r from-fuchsia-500 to-cyan-500 text-white px-6 py-1.5 rounded-full text-[10px] md:text-xs font-bold tracking-widest shadow-[0_0_15px_rgba(232,121,249,0.5)] whitespace-nowrap z-10">
               RECOMMENDED
             </div>
          )}
          {special && (
             <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-gradient-to-r from-yellow-500 to-amber-500 text-white px-6 py-1.5 rounded-full text-[10px] md:text-xs font-bold tracking-widest shadow-[0_0_15px_rgba(245,158,11,0.5)] whitespace-nowrap z-10">
               PREMIUM
             </div>
          )}
          <div className="mb-4">
            <span className="text-xs font-bold text-gray-400 tracking-widest uppercase">{level}</span>
            <h3 className="text-xl lg:text-2xl font-black text-white mt-1">{title}</h3>
          </div>
          <div className="mb-6 border-b border-white/10 pb-6">
            <span className={`text-4xl lg:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r ${titleColor}`}>¥{price}</span>
            <span className="text-gray-400 text-sm font-bold ml-1">/ 月</span>
          </div>
          <ul className="flex-1 space-y-4 mb-8">
            {features.map((f, i) => (
              <li key={i} className="flex items-start gap-3 text-xs lg:text-sm font-medium text-gray-300 leading-relaxed">
                <Check size={16} className={`${special ? 'text-fuchsia-400' : 'text-cyan-400'} shrink-0 mt-0.5`} />
                {f}
              </li>
            ))}
          </ul>
          <button 
            onClick={(e) => {
              e.stopPropagation();
              if (isSelected) {
                window.open('https://e-wave.jp/p/r/OzoQdhtG', '_blank');
              } else {
                setIsSelected(true);
              }
            }}
            className={`w-full py-3 lg:py-4 rounded-xl font-bold transition-all text-sm tracking-widest mt-auto ${
              isSelected
                ? 'bg-gradient-to-r from-cyan-400 to-blue-500 text-white shadow-[0_0_20px_rgba(34,211,238,0.5)]'
                : special 
                  ? 'bg-gradient-to-r from-fuchsia-500 to-purple-600 text-white hover:shadow-[0_0_20px_rgba(232,121,249,0.5)] hover:-translate-y-1'
                  : recommended 
                    ? 'bg-gradient-to-r from-cyan-500 to-blue-600 text-white hover:shadow-[0_0_20px_rgba(34,211,238,0.5)] hover:-translate-y-1' 
                    : 'bg-white/10 text-white hover:bg-white/20 border border-white/20 hover:-translate-y-1'
            }`}>
            {isSelected ? 'このプランで申し込む' : '選択する'}
          </button>
        </div>
      );
    }

    // Reactアプリの描画開始
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
